name: Android Release (Manual)

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Release version name (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
        type: string
      version_code:
        description: 'Release version code (integer)'
        required: true
        default: '1'
        type: number

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

jobs:
  release-build:
    name: Signed Release Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=8.5 --gradle-distribution-url=https://mirrors.cloud.tencent.com/gradle/gradle-8.5-bin.zip

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks

      - name: Update version
        run: |
          sed -i "s/versionName = \".*\"/versionName = \"${{ inputs.version_name }}\"/" app/build.gradle.kts
          sed -i "s/versionCode = .*/versionCode = ${{ inputs.version_code }}/" app/build.gradle.kts

      - name: Run lint
        run: ./gradlew lint

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build signed release AAB
        run: ./gradlew bundleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build signed release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: parking-notification-v${{ inputs.version_name }}-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 90

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: parking-notification-v${{ inputs.version_name }}-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version_name }}
          name: Release v${{ inputs.version_name }}
          draft: true
          generate_release_notes: true
          files: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/apk/release/*.apk
