name: Android Release (Tag)

on:
  push:
    tags:
      - 'v*'

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=8.5

      - name: Parse version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # versionCode = major*100000 + minor*1000 + patch
          IFS='.' read -r major minor patch <<< "$TAG"
          # strip non-numeric suffix like -beta1
          patch="${patch%%[-]*}"
          major="${major%%[-]*}"
          minor="${minor%%[-]*}"
          CODE=$(( major * 100000 + minor * 1000 + patch ))
          echo "versionCode=$CODE" >> $GITHUB_OUTPUT

      - name: Setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
          elif [ -f release.keystore ]; then
            cp release.keystore app/keystore.jks
            echo "Using pre-committed release.keystore"
          else
            echo "No keystore found, will use debug signing"
          fi

      - name: Update version in build.gradle.kts
        run: |
          sed -i "s/versionCode = .*/versionCode = ${{ steps.version.outputs.versionCode }}/" app/build.gradle.kts
          sed -i "s/versionName = \".*\"/versionName = \"${{ steps.version.outputs.tag }}\"/" app/build.gradle.kts

      - name: Run lint
        run: ./gradlew lint

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk
